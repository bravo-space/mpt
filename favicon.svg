<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Green background -->
  <rect width="200" height="200" fill="#6ba84d"/>
  
  <!-- Head -->
  <ellipse cx="100" cy="85" rx="55" ry="60" fill="#7ec850"/>
  
  <!-- Left eye -->
  <ellipse cx="75" cy="70" rx="18" ry="22" fill="#ffffff"/>
  <circle cx="75" cy="72" r="10" fill="#000000"/>
  <circle cx="77" cy="70" r="4" fill="#ffffff"/>
  
  <!-- Right eye -->
  <ellipse cx="125" cy="70" rx="18" ry="22" fill="#ffffff"/>
  <circle cx="125" cy="72" r="10" fill="#000000"/>
  <circle cx="127" cy="70" r="4" fill="#ffffff"/>
  
  <!-- Mouth/lips -->
  <path d="M 85 105 Q 100 125 115 105" stroke="#8b4513" stroke-width="4" fill="none" stroke-linecap="round"/>
  <ellipse cx="100" cy="115" rx="20" ry="15" fill="#c16b3a"/>
  
  <!-- Chin/jaw definition -->
  <path d="M 70 110 Q 100 135 130 110" stroke="#5a8a3a" stroke-width="2" fill="none"/>
</svg>
